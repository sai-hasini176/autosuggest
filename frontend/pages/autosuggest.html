<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Suggest</title>
    <link rel="stylesheet" href="../css/autosuggest.css">
</head>

<body>
<span class="gear">&#9881;</span>
<span class="pill"><span class="online">&#8226;</span> online | &#128336; - ms</span>
<div class="main-content">
    <h1><span class="half">Being</span>Infinity</h1>
    <p style="color: grey;">One million Phrases. Four algorithms. Prefix Based Auto Suggest.</p>

    <div class="search">
        <span class="icon">&#128269;</span>
        <input type="text" id="searchbox" class="searchbox" placeholder="Start typing to search" onkeyup="autosuggest()">
    </div>
</div>
<div id="search-suggestions"></div>
<script src="../js/autosuggest.js"></script>
</body>
